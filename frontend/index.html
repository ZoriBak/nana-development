<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Body Map</title>
  <link rel="stylesheet" href="style.css">

  <script type="module" src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js"></script>
</head>
<body>

<div class="app">
  <h2>Where does it hurt?</h2>

  <button onclick="toggleChildMode()">👶 Child Mode</button>

  
  <div id="canvas-container" style="width:100%; height:400px;"></div>

  <textarea id="notes" placeholder="Add notes..."></textarea>

  <button onclick="submitData()">Submit</button>

  <div class="nav">
    <button onclick="goReports()">Reports</button>
    <button onclick="goDoctor()">Doctor</button>
  </div>
</div>

<script type="module" src="threeSetup.js"></script>
<script src="app.js"></script>

<script>
  
  window.addEventListener('resize', () => {
    const container = document.getElementById('canvas-container');
    if (window.renderer && window.camera) {
      window.renderer.setSize(container.clientWidth, container.clientHeight);
      window.camera.aspect = container.clientWidth / container.clientHeight;
      window.camera.updateProjectionMatrix();
    }
  });
</script>

</body>
</html>
